site_name: 工作项目文档站
site_description: 把 Obsidian 工作目录中的项目文档发布为可在线浏览的站点
site_author: Eric Lee

theme:
  name: material
  language: zh
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 工作项目总览: 项目/index.md
  - linux内核笔记:
      - 项目主页: 项目/linux内核笔记/index.md
      - 文档:
          - 等待搬运中: 项目/linux内核笔记/文档/等待搬运中.md
  - 导盲兔:
      - 项目主页: 项目/导盲兔/index.md
      - 文档:
          - 测试: 项目/导盲兔/文档/测试.md
  - 一句话编程:
      - 项目主页: 项目/一句话编程/index.md
      - 补充页:
          - 模块索引: 项目/一句话编程/模块索引.md
          - 协议速览: 项目/一句话编程/协议速览.md
      - 文档:
          - AI一句话编程: 项目/一句话编程/文档/AI一句话编程.md
          - 硬件接线: 项目/一句话编程/文档/硬件接线.md
          - 下位机文档:
              - PWM舵机模块下位机开发文档: 项目/一句话编程/文档/下位机文档/PWM舵机模块下位机开发文档.md
              - 按键开关模块下位机开发文档: 项目/一句话编程/文档/下位机文档/按键开关模块下位机开发文档.md
              - 三色LED模块下位机开发文档: 项目/一句话编程/文档/下位机文档/三色LED模块下位机开发文档.md
              - 土壤湿度模块下位机开发文档: 项目/一句话编程/文档/下位机文档/土壤湿度模块下位机开发文档.md
              - 温湿度模块下位机开发文档: 项目/一句话编程/文档/下位机文档/温湿度模块下位机开发文档.md
  - 站点维护:
      - 发布与同步: 站点维护/发布与同步.md